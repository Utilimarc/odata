services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: odata_test
      POSTGRES_USER: odata
      POSTGRES_PASSWORD: odata
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odata -d odata_test"]
      interval: 2s
      timeout: 5s
      retries: 10

  test:
    image: node:20-slim
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      - NODE_ENV=test
    command: sh -c "npm ci && npm run test:unit"

  e2e:
    image: node:20-slim
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      - NODE_ENV=test
      - DB_DIALECT=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=odata_test
      - DB_USER=odata
      - DB_PASSWORD=odata
      - DB_SCHEMA=public
    command: sh -c "npm ci && npm run test:e2e"

  security:
    image: node:20-slim
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      - NODE_ENV=test
      - DB_DIALECT=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=odata_test
      - DB_USER=odata
      - DB_PASSWORD=odata
      - DB_SCHEMA=public
    command: sh -c "npm ci && npm run test:security"

  demo:
    image: node:20-slim
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DB_DIALECT=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=odata_test
      - DB_USER=odata
      - DB_PASSWORD=odata
      - DB_SCHEMA=public
      - port=3000
    command: sh -c "npm ci && npx ts-node examples/express-app/server.ts"

  lint:
    image: node:20-slim
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    command: sh -c "npm ci && npm run lint && npm run typecheck"

  build:
    image: node:20-slim
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    command: sh -c "npm ci && npm run build"

  shell:
    image: node:20-slim
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    stdin_open: true
    tty: true
    entrypoint: sh -c "npm ci && bash"

volumes:
  node_modules:
